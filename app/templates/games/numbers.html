<!doctype html>
<html lang="cs" translate="no">
<head>
  {% include '_kiosk_head.html' %}
  <meta name="google" content="notranslate">
  <title>Čísla – Nexus Junior</title>
  <style>
    #letter-display {
      font-weight: 900; line-height: 1;
      transition: transform 0.15s cubic-bezier(.34,1.56,.64,1);
      user-select: none;
    }
    #letter-card {
      transition: background .25s ease, border-color .25s ease, box-shadow .25s ease;
    }
    #letter-card.flash-correct {
      background: rgba(74,222,128,.18) !important;
      border-color: rgba(74,222,128,.45) !important;
      box-shadow: 0 0 60px rgba(74,222,128,.25), 0 8px 32px -4px rgba(0,0,0,.5);
    }
    #letter-card.flash-wrong {
      background: rgba(248,113,113,.18) !important;
      border-color: rgba(248,113,113,.45) !important;
      box-shadow: 0 0 60px rgba(248,113,113,.2), 0 8px 32px -4px rgba(0,0,0,.5);
    }
    #letter-display.scale-up   { transform: scale(1.18) rotate(-2deg); }
    #letter-display.scale-down { transform: scale(0.87) rotate(2deg); }

    #answer-track span {
      display: inline-block; min-width:.6em; text-align:center;
      transition: color .15s ease;
    }

    .lvl-dot {
      width:11px; height:11px; border-radius:50%;
      background: rgba(255,255,255,.18);
      transition: background .3s ease, transform .3s ease;
    }
    .lvl-dot.done    { background:#4ade80; }
    .lvl-dot.current { background:rgba(255,255,255,.8); transform:scale(1.4);
                       box-shadow:0 0 8px rgba(255,255,255,.5); }

    #feedback { transition: opacity .3s ease, transform .3s ease; }
    #feedback.hide { opacity:0; transform:translateY(4px); }

    @keyframes levelUp {
      0%  { transform:scale(.7);  opacity:0; }
      60% { transform:scale(1.25);opacity:1; }
      100%{ transform:scale(1);   opacity:1; }
    }
    .level-up-anim { animation: levelUp .5s cubic-bezier(.34,1.56,.64,1) forwards; }

    .sel-card {
      transition: transform .18s cubic-bezier(.34,1.56,.64,1), box-shadow .18s ease;
      cursor: pointer;
    }
    .sel-card:hover, .sel-card:focus-visible {
      transform: scale(1.05) translateY(-3px);
      box-shadow: 0 12px 40px -8px rgba(0,0,0,.6);
      outline: none;
    }
    .sel-card:active { transform:scale(.97); }

    #reward-toast {
      position:fixed; bottom:2rem; left:50%; transform:translateX(-50%);
      z-index:60; border-radius:1.25rem;
      background:linear-gradient(135deg,#f59e0b,#d97706);
      padding:.75rem 1.75rem; font-weight:900; font-size:1.25rem;
      color:white; box-shadow:0 8px 32px rgba(0,0,0,.5);
      transition: opacity .4s ease, transform .4s ease;
      pointer-events:none;
    }
    #reward-toast.hide { opacity:0; transform:translateX(-50%) translateY(12px); }
  </style>
</head>
<body class="min-h-screen text-white overflow-hidden">
  <div class="stars" id="stars"></div>

  <!-- Not enough stars overlay -->
  <div id="no-stars-overlay"
       class="hidden fixed inset-0 z-50 flex items-center justify-center bg-slate-950/95 backdrop-blur-sm">
    <div class="text-center rounded-3xl bg-slate-900 border border-slate-700 p-8 max-w-sm mx-4">
      <div class="text-6xl mb-4">💔</div>
      <h2 class="text-2xl font-black mb-2">Nemáš dost hvězd!</h2>
      <p id="no-stars-msg" class="text-white/60 mb-6 text-lg"></p>
      <button onclick="document.getElementById('no-stars-overlay').classList.add('hidden')"
              class="rounded-2xl bg-slate-700 hover:bg-slate-600 px-8 py-3 font-black text-white transition">
        OK
      </button>
    </div>
  </div>

  <!-- Reward toast -->
  <div id="reward-toast" class="hide"></div>

  <!-- ══════════ SELECTION SCREEN ══════════ -->
  <div id="sel-screen" class="relative z-10 flex flex-col h-screen">

    <header id="sel-header" class="flex items-center justify-between px-6 py-3 shrink-0">
      <button onclick="history.back()"
              class="rounded-2xl border border-white/20 bg-white/5 px-4 py-2 text-sm font-bold
                     text-white/80 hover:bg-white/15 transition">
        ← Zpět
      </button>
      <div class="text-center">
        <div class="text-2xl font-black">🔢 Čísla</div>
        <div class="text-sm text-white/40 font-bold mt-0.5">Vyber co chceš trénovat</div>
      </div>
      <div class="text-right min-w-[6rem]">
        <div id="sel-balance" class="hidden font-black text-yellow-400 text-lg">
          ⭐ <span id="sel-balance-val">0</span>
        </div>
      </div>
    </header>

    <main id="sel-main" class="flex-1 overflow-y-auto px-6 pb-4 pt-3">
      <div id="level-grid" class="grid grid-cols-2 md:grid-cols-4 gap-4">
        <!-- rendered by JS -->
      </div>
    </main>

  </div>

  <!-- ══════════ GAME SCREEN ══════════ -->
  <div id="game-screen" class="hidden relative z-10 flex flex-col h-screen">

    <header id="game-header" class="flex items-center justify-between px-6 py-3 shrink-0">
      <button onclick="goToSelection()"
              class="rounded-2xl border border-white/20 bg-white/5 px-4 py-2 text-sm font-bold
                     text-white/80 hover:bg-white/15 transition">
        ← Výběr
      </button>
      <div id="game-title-center" class="text-center">
        <div class="text-xl font-black tracking-tight">🔢 Čísla</div>
        <div id="level-label" class="text-sm text-white/50 font-bold mt-0.5">Úroveň 1 · 1–5</div>
      </div>
      <div class="text-right min-w-[4rem]">
        <div id="score-display" class="text-3xl font-black tabular-nums">0</div>
        <div id="game-balance" class="hidden text-sm font-bold text-yellow-400 tabular-nums">
          ⭐ <span id="game-balance-val">0</span>
        </div>
        <div class="text-xs text-white/40 font-bold">skóre</div>
      </div>
    </header>

    <main class="flex-1 flex flex-col items-center justify-center gap-5 px-6 overflow-hidden">

      <div id="letter-card"
           class="flex items-center justify-center rounded-3xl bg-white/5 border border-white/10 shadow-2xl"
           style="width:min(56vw,52vh);height:min(56vw,52vh);">
        <div class="flex flex-col items-center justify-center gap-3">
          <div id="letter-display" class="text-white drop-shadow-2xl"></div>
          <div id="answer-track" class="hidden font-black text-4xl tracking-widest"></div>
        </div>
      </div>

      <div id="feedback" class="hide text-2xl font-black text-center min-h-[2.2rem]">
        Super! ✅
      </div>

      <div class="w-full" style="max-width:min(56vw,52vh)">
        <div class="flex justify-between text-xs text-white/35 mb-1.5 font-bold">
          <span id="progress-text">0 / 10</span>
          <span id="next-label">do další úrovně</span>
        </div>
        <div class="h-2.5 rounded-full bg-white/10 overflow-hidden">
          <div id="progress-bar" class="h-full rounded-full transition-all duration-300"
               style="width:0%;background:#f59e0b"></div>
        </div>
      </div>

    </main>

    <footer class="flex items-center justify-center pb-5 shrink-0 min-h-[2rem]">
      <div id="level-dots" class="flex gap-2"></div>
      <div id="round-indicator" class="hidden text-sm font-bold text-white/40"></div>
    </footer>

  </div>

  <script>
    // ── Helpers ───────────────────────────────────────────────────────
    function rng(a,b) { return Array.from({length:b-a+1},(_,i)=>a+i); }
    function rc(arr)  { return arr[Math.floor(Math.random()*arr.length)]; }

    function mkNum(arr) {
      return () => { const n=rc(arr); return {d:String(n), a:String(n)}; };
    }
    function mkAdd(minSum, maxSum) {
      return () => {
        const sum  = minSum + Math.floor(Math.random()*(maxSum-minSum+1));
        const left = 1 + Math.floor(Math.random()*(sum-1));
        return {d:`${left}+${sum-left}`, a:String(sum)};
      };
    }

    // ── Level definitions ─────────────────────────────────────────────
    const LEVELS = [
      { id:1, generate:mkNum([1,2,3,4,5]),   target:10, label:'1–5',     desc:'Začátečník',  cost:2,  maxReward:5,  preview:'1  2  3  4  5',  color:['rgba(245,158,11,.18)','rgba(245,158,11,.4)','#f59e0b'] },
      { id:2, generate:mkNum(rng(1,9)),       target:15, label:'1–9',     desc:'Číslice',     cost:3,  maxReward:8,  preview:'1  2  …  9',     color:['rgba(249,115,22,.18)','rgba(249,115,22,.4)','#f97316'] },
      { id:3, generate:mkNum(rng(0,9)),       target:15, label:'0–9',     desc:'S nulou',     cost:3,  maxReward:8,  preview:'0  1  …  9',     color:['rgba(239,68,68,.18)','rgba(239,68,68,.4)','#ef4444']   },
      { id:4, generate:mkNum(rng(10,19)),     target:15, label:'10–19',   desc:'Dvouciferná', cost:4,  maxReward:10, preview:'10  11  …  19',  color:['rgba(139,92,246,.18)','rgba(139,92,246,.4)','#8b5cf6'] },
      { id:5, generate:mkNum(rng(10,99)),     target:20, label:'10–99',   desc:'Velká čísla', cost:6,  maxReward:16, preview:'10  …  99',      color:['rgba(6,182,212,.18)','rgba(6,182,212,.4)','#06b6d4']   },
      { id:6, generate:mkAdd(2,9),            target:15, label:'Sčítání', desc:'a+b=?',       cost:5,  maxReward:13, preview:'2+3  4+1',       color:['rgba(16,185,129,.18)','rgba(16,185,129,.4)','#10b981'] },
      { id:7, generate:mkAdd(10,18),          target:20, label:'Výpočty', desc:'Větší součty', cost:7, maxReward:20, preview:'7+8  9+6',       color:['rgba(14,165,233,.18)','rgba(14,165,233,.4)','#0ea5e9'] },
    ];

    // ── Child context ─────────────────────────────────────────────────
    const childId = new URLSearchParams(location.search).get('child_id');
    let balance   = 0;

    // ── State ─────────────────────────────────────────────────────────
    let mode          = 'all';
    let levelIdx      = 0;
    let score         = 0;
    let levelProgress = 0;
    let levelWrong    = 0;
    let round         = 1;
    let currentDisplay= '';
    let currentAnswer = '';
    let inputPos      = 0;
    let locked        = true;
    let fbTimer       = null;

    // ── DOM refs ──────────────────────────────────────────────────────
    const selScreen      = document.getElementById('sel-screen');
    const gameScreen     = document.getElementById('game-screen');
    const levelGrid      = document.getElementById('level-grid');
    const letterDisplay  = document.getElementById('letter-display');
    const letterCard     = document.getElementById('letter-card');
    const answerTrack    = document.getElementById('answer-track');
    const feedbackEl     = document.getElementById('feedback');
    const scoreEl        = document.getElementById('score-display');
    const progressBar    = document.getElementById('progress-bar');
    const progressText   = document.getElementById('progress-text');
    const levelLabel     = document.getElementById('level-label');
    const nextLabel      = document.getElementById('next-label');
    const levelDots      = document.getElementById('level-dots');
    const roundIndicator = document.getElementById('round-indicator');
    const rewardToast    = document.getElementById('reward-toast');

    // ── Balance helpers ───────────────────────────────────────────────
    function updateBalanceDisplay() {
      if (!childId) return;
      document.getElementById('sel-balance').classList.remove('hidden');
      document.getElementById('sel-balance-val').textContent = balance;
      document.getElementById('game-balance').classList.remove('hidden');
      document.getElementById('game-balance-val').textContent = balance;
    }

    async function fetchBalance() {
      if (!childId) return;
      try {
        const d = await fetch(`/api/child/${childId}/balance`).then(r=>r.json());
        balance = d.points; updateBalanceDisplay();
      } catch {}
    }

    async function deductCost(lvlIdx) {
      if (!childId) return true;
      const cost = LEVELS[lvlIdx].cost;
      if (cost <= 0) return true;
      try {
        const d = await fetch('/api/game/start', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({child_id:+childId, cost})
        }).then(r=>r.json());
        if (!d.ok) {
          document.getElementById('no-stars-msg').textContent =
            `Potřebuješ ${d.cost}⭐, ale máš jen ${d.balance}⭐. Splň nejdřív úkoly!`;
          document.getElementById('no-stars-overlay').classList.remove('hidden');
          return false;
        }
        balance = d.new_balance; updateBalanceDisplay(); return true;
      } catch { return true; }
    }

    async function awardPoints(correct, wrong, lvlIdx) {
      if (!childId) return;
      const lvl = LEVELS[lvlIdx];
      if (lvl.maxReward <= 0) return;
      try {
        const d = await fetch('/api/game/reward', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({child_id:+childId, correct, wrong,
                                max_reward:lvl.maxReward, label:lvl.label})
        }).then(r=>r.json());
        if (d.ok) { balance = d.new_balance; updateBalanceDisplay(); showRewardToast(d.awarded, d.accuracy); }
      } catch {}
    }

    let rewardTimer = null;
    function showRewardToast(awarded, accuracy) {
      if (rewardTimer) clearTimeout(rewardTimer);
      rewardToast.textContent = awarded > 0
        ? `+${awarded} ⭐  (přesnost ${accuracy}%)`
        : `0 ⭐  Příště lépe! (${accuracy}%)`;
      rewardToast.style.background = awarded > 0
        ? 'linear-gradient(135deg,#f59e0b,#d97706)'
        : 'linear-gradient(135deg,#64748b,#475569)';
      rewardToast.classList.remove('hide');
      rewardTimer = setTimeout(() => rewardToast.classList.add('hide'), 3000);
    }

    // ── Iframe detection ──────────────────────────────────────────────
    if (window !== window.top) {
      document.getElementById('sel-header').classList.add('hidden');
      document.getElementById('game-title-center').classList.add('hidden');
      document.getElementById('sel-main').classList.replace('pt-3','pt-4');
    }

    // ── Build selection cards ─────────────────────────────────────────
    LEVELS.forEach((lvl, i) => {
      const [bg, border, text] = lvl.color;
      const btn = document.createElement('button');
      btn.className = 'sel-card rounded-2xl border flex flex-col items-center justify-center gap-1.5 py-4 px-3 text-center';
      btn.style.cssText = `background:${bg};border-color:${border};min-height:130px`;
      btn.innerHTML = `
        <span class="font-black leading-none tracking-wide" style="color:${text};font-size:clamp(1rem,2.5vw,1.5rem)">${lvl.preview}</span>
        <span class="text-sm font-black text-white/80">${lvl.label}</span>
        <span class="text-xs font-bold opacity-40">${lvl.desc}</span>
        <span class="text-xs font-black mt-1" style="color:${text}">💰 ${lvl.cost}⭐ → max +${lvl.maxReward}⭐</span>`;
      btn.addEventListener('click', () => startGame(i));
      levelGrid.appendChild(btn);
    });

    const allBtn = document.createElement('button');
    allBtn.className = 'sel-card rounded-2xl border flex flex-col items-center justify-center gap-1.5 py-4 px-3 text-center';
    allBtn.style.cssText = 'background:linear-gradient(135deg,rgba(250,204,21,.2),rgba(251,146,60,.15));border-color:rgba(250,204,21,.4);min-height:130px';
    allBtn.innerHTML = `
      <span class="font-black leading-none" style="font-size:clamp(1.4rem,3vw,2rem)">🎯</span>
      <span class="text-sm font-black text-white/80">Vše 1–7</span>
      <span class="text-xs font-bold opacity-40">Všechny úrovně</span>
      <span class="text-xs font-black mt-1 text-yellow-400">💰 po úrovních</span>`;
    allBtn.addEventListener('click', () => startGame(-1));
    levelGrid.appendChild(allBtn);

    // ── Screen control ────────────────────────────────────────────────
    async function startGame(idx) {
      mode          = idx < 0 ? 'all' : 'single';
      levelIdx      = idx < 0 ? 0 : idx;
      score         = 0;
      levelProgress = 0;
      levelWrong    = 0;
      round         = 1;

      if (childId) { const ok = await deductCost(levelIdx); if (!ok) return; }

      selScreen.classList.add('hidden');
      gameScreen.classList.remove('hidden');
      updateUI();
      nextQuestion();
    }

    function goToSelection() {
      locked = true;
      gameScreen.classList.add('hidden');
      selScreen.classList.remove('hidden');
    }

    // ── Game logic ────────────────────────────────────────────────────
    function nextQuestion() {
      const q = LEVELS[levelIdx].generate();
      currentDisplay = q.d; currentAnswer = q.a; inputPos = 0; locked = false;
      letterDisplay.textContent = currentDisplay;
      letterDisplay.className   = 'text-white drop-shadow-2xl';
      letterCard.classList.remove('flash-correct','flash-wrong');
      const len = currentDisplay.length;
      letterDisplay.style.fontSize =
        len === 1 ? 'min(30vw,34vh)' : len === 2 ? 'min(17vw,20vh)' : 'min(11vw,13vh)';
      updateAnswerTrack();
    }

    function updateAnswerTrack() {
      if (currentAnswer.length <= 1) { answerTrack.classList.add('hidden'); return; }
      answerTrack.classList.remove('hidden');
      const c = LEVELS[levelIdx].color[2];
      answerTrack.innerHTML = currentAnswer.split('').map((d,i) =>
        i < inputPos ? `<span style="color:${c}">${d}</span>`
                     : `<span style="color:rgba(255,255,255,.2)">_</span>`
      ).join('');
    }

    function updateUI() {
      const lvl = LEVELS[levelIdx];
      scoreEl.textContent      = score;
      levelLabel.textContent   = `Úroveň ${lvl.id} · ${lvl.label}`;
      progressText.textContent = `${levelProgress} / ${lvl.target}`;
      progressBar.style.width  = `${Math.min(100,(levelProgress/lvl.target)*100)}%`;
      progressBar.style.background = lvl.color[2];
      nextLabel.textContent    = mode === 'single' ? 'do dalšího kola' : 'do další úrovně';

      if (mode === 'single') {
        levelDots.innerHTML = '';
        roundIndicator.classList.remove('hidden');
        roundIndicator.textContent = `Kolo ${round}`;
      } else {
        roundIndicator.classList.add('hidden');
        levelDots.innerHTML = '';
        LEVELS.forEach((_,i) => {
          const d = document.createElement('div');
          d.className = 'lvl-dot';
          if (i < levelIdx) d.classList.add('done');
          else if (i === levelIdx) d.classList.add('current');
          levelDots.appendChild(d);
        });
      }
    }

    function showFeedback(msg, color) {
      if (fbTimer) clearTimeout(fbTimer);
      feedbackEl.textContent = msg; feedbackEl.style.color = color;
      feedbackEl.classList.remove('hide');
      fbTimer = setTimeout(() => feedbackEl.classList.add('hide'), 900);
    }

    function flash(cls) {
      letterDisplay.classList.add(cls==='correct' ? 'scale-up' : 'scale-down');
      letterCard.classList.add(cls==='correct' ? 'flash-correct' : 'flash-wrong');
      setTimeout(() => {
        letterDisplay.classList.remove('scale-up','scale-down');
        letterCard.classList.remove('flash-correct','flash-wrong');
      }, 350);
    }

    function handleCorrect() {
      score++; levelProgress++;
      flash('correct'); showFeedback('Super! ✅', '#4ade80'); updateUI();

      const lvl = LEVELS[levelIdx];
      if (levelProgress >= lvl.target) {
        locked = true;
        setTimeout(async () => {
          if (mode === 'single') {
            await awardPoints(levelProgress, levelWrong, levelIdx);
            levelWrong=0; round++; levelProgress=0;
            if (childId) { const ok=await deductCost(levelIdx); if (!ok) { goToSelection(); return; } }
            updateUI();
            letterDisplay.textContent='🎉'; letterDisplay.classList.add('level-up-anim');
            letterDisplay.style.fontSize='min(18vw,20vh)'; answerTrack.classList.add('hidden');
            showFeedback(`Kolo ${round}! 🚀`,'#facc15');
            setTimeout(nextQuestion, 900);

          } else if (levelIdx < LEVELS.length-1) {
            await awardPoints(levelProgress, levelWrong, levelIdx);
            levelWrong=0; levelIdx++; levelProgress=0;
            if (childId) { const ok=await deductCost(levelIdx); if (!ok) { goToSelection(); return; } }
            updateUI();
            letterDisplay.textContent='🎉'; letterDisplay.classList.add('level-up-anim');
            letterDisplay.style.fontSize='min(18vw,20vh)'; answerTrack.classList.add('hidden');
            showFeedback(`Úroveň ${LEVELS[levelIdx].id}! 🚀`,'#facc15');
            setTimeout(nextQuestion, 900);

          } else {
            await awardPoints(levelProgress, levelWrong, levelIdx);
            letterDisplay.textContent='🏆'; letterDisplay.style.fontSize='min(20vw,22vh)';
            letterDisplay.classList.add('level-up-anim'); answerTrack.classList.add('hidden');
            feedbackEl.textContent=`🎉 Hotovo! ${score} skóre!`; feedbackEl.style.color='#facc15';
            feedbackEl.classList.remove('hide');
            nextLabel.textContent='hotovo!'; progressBar.style.width='100%';
          }
        }, 500);
      } else {
        setTimeout(nextQuestion, 380);
      }
    }

    function handleWrong() {
      levelWrong++; inputPos=0; updateAnswerTrack();
      flash('wrong'); showFeedback('Zkus znovu! ❌','#f87171');
    }

    // ── Keyboard ──────────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      if (locked) return;
      if (!/^[0-9]$/.test(e.key)) return;
      if (e.ctrlKey || e.altKey || e.metaKey) return;
      if (e.key === currentAnswer[inputPos]) {
        inputPos++;
        if (inputPos >= currentAnswer.length) { handleCorrect(); }
        else { updateAnswerTrack(); showFeedback('Dál! 👍','#facc15'); }
      } else { handleWrong(); }
    });

    // ── Stars ─────────────────────────────────────────────────────────
    const se = document.getElementById('stars');
    for (let i=0;i<70;i++) {
      const s=document.createElement('div'), z=Math.random()*2.5+.5;
      s.className='star';
      s.style.cssText=`width:${z}px;height:${z}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*4+2).toFixed(1)}s;--delay:-${(Math.random()*5).toFixed(1)}s;`;
      se.appendChild(s);
    }

    // ── Init ──────────────────────────────────────────────────────────
    fetchBalance();
  </script>
</body>
</html>
