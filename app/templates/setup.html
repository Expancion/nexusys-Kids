<!doctype html>
<html lang="cs" id="html-root">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nexusys Junior — Setup</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
    .lang-card {
      cursor: pointer;
      transition: transform .15s, box-shadow .15s, border-color .15s;
    }
    .lang-card:hover { transform: scale(1.04); }
    .lang-card.active {
      border-color: #6366f1;
      box-shadow: 0 0 0 3px #6366f180;
    }
    [data-cs], [data-en] { transition: opacity .15s; }
  </style>
</head>
<body class="min-h-screen bg-[#0d0d18] text-slate-100 flex items-center justify-center px-4">

  <div class="w-full max-w-md space-y-8">

    <!-- Logo -->
    <div class="text-center">
      <div class="text-5xl mb-3">🏠</div>
      <h1 class="text-2xl font-black text-white">Nexusys Junior</h1>
      <p class="text-slate-400 mt-1">
        <span data-cs>Nastavení systému</span>
        <span data-en class="hidden">System setup</span>
      </p>
    </div>

    <form method="post" id="setup-form" class="space-y-6">

      <!-- Step 1: Language -->
      <div class="rounded-2xl border border-slate-700 bg-slate-900 p-6 space-y-4">
        <p class="text-xs font-bold uppercase tracking-widest text-slate-500">
          <span data-cs>1. Jazyk / Language</span>
          <span data-en class="hidden">1. Language</span>
        </p>
        <div class="grid grid-cols-2 gap-4">
          <div class="lang-card rounded-xl border-2 border-slate-700 bg-slate-800 p-4 text-center"
               id="card-cs" onclick="selectLang('cs')">
            <div class="text-3xl mb-1">🇨🇿</div>
            <div class="font-black text-white">Čeština</div>
            <div class="text-xs text-slate-400 mt-0.5">Czech</div>
          </div>
          <div class="lang-card rounded-xl border-2 border-slate-700 bg-slate-800 p-4 text-center"
               id="card-en" onclick="selectLang('en')">
            <div class="text-3xl mb-1">🇬🇧</div>
            <div class="font-black text-white">English</div>
            <div class="text-xs text-slate-400 mt-0.5">Angličtina</div>
          </div>
        </div>
        <input type="hidden" name="lang" id="lang-input" value="cs" />
      </div>

      <!-- Step 2: Password -->
      <div class="rounded-2xl border border-slate-700 bg-slate-900 p-6 space-y-4">
        <p class="text-xs font-bold uppercase tracking-widest text-slate-500">
          <span data-cs>2. Rodičovské heslo</span>
          <span data-en class="hidden">2. Parent password</span>
        </p>

        <div>
          <label class="block text-sm font-bold text-slate-300 mb-1.5">
            <span data-cs>Heslo</span>
            <span data-en class="hidden">Password</span>
          </label>
          <input type="password" name="password" id="pw" required minlength="6"
                 class="w-full rounded-xl bg-slate-800 border border-slate-700 px-4 py-3 text-white
                        placeholder:text-slate-500 focus:outline-none focus:border-indigo-500
                        focus:ring-1 focus:ring-indigo-500 transition"
                 data-ph-cs="Alespoň 6 znaků" data-ph-en="At least 6 characters"
                 placeholder="Alespoň 6 znaků" />
        </div>

        <div>
          <label class="block text-sm font-bold text-slate-300 mb-1.5">
            <span data-cs>Heslo znovu</span>
            <span data-en class="hidden">Confirm password</span>
          </label>
          <input type="password" name="password2" id="pw2" required minlength="6"
                 class="w-full rounded-xl bg-slate-800 border border-slate-700 px-4 py-3 text-white
                        placeholder:text-slate-500 focus:outline-none focus:border-indigo-500
                        focus:ring-1 focus:ring-indigo-500 transition"
                 data-ph-cs="Zopakujte heslo" data-ph-en="Repeat password"
                 placeholder="Zopakujte heslo" />
        </div>

        {% if error %}
        <p class="rounded-xl bg-red-500/15 border border-red-500/30 px-4 py-3 text-sm text-red-400">
          {{ error }}
        </p>
        {% endif %}
      </div>

      <button type="submit"
              class="w-full rounded-xl bg-indigo-600 hover:bg-indigo-500 px-6 py-3.5
                     font-black text-white transition active:scale-95 text-lg">
        <span data-cs>Dokončit nastavení →</span>
        <span data-en class="hidden">Complete setup →</span>
      </button>

    </form>
  </div>

  <script>
    const LANG_KEY = 'setup_lang';
    let current = localStorage.getItem(LANG_KEY) || 'cs';

    function selectLang(lang) {
      current = lang;
      localStorage.setItem(LANG_KEY, lang);
      document.getElementById('lang-input').value = lang;
      document.getElementById('html-root').lang = lang;

      document.querySelectorAll('[data-cs]').forEach(el => el.classList.toggle('hidden', lang !== 'cs'));
      document.querySelectorAll('[data-en]').forEach(el => el.classList.toggle('hidden', lang !== 'en'));

      document.getElementById('card-cs').classList.toggle('active', lang === 'cs');
      document.getElementById('card-en').classList.toggle('active', lang === 'en');

      // Update placeholders
      document.querySelectorAll('[data-ph-cs]').forEach(el => {
        el.placeholder = lang === 'en' ? el.dataset.phEn : el.dataset.phCs;
      });
    }

    // Restore previously chosen lang (e.g. after validation error redirect)
    selectLang('{{ request.form.get("lang", "cs") }}' || current);
  </script>
</body>
</html>
