{# Reusable fullscreen iframe overlay. Include in any kiosk page. #}
<div id="kiosk-overlay" class="hidden">
  <div id="overlay-bar">
    <button onclick="closeOverlay()"
            style="display:flex;align-items:center;gap:.5rem;background:rgba(255,255,255,.12);
                   border:none;border-radius:.75rem;padding:.5rem 1rem;font-size:.875rem;
                   font-weight:900;color:white;cursor:pointer;transition:background .2s;font-family:inherit;"
            onmouseover="this.style.background='rgba(255,255,255,.22)'"
            onmouseout="this.style.background='rgba(255,255,255,.12)'">
      🏠 Domů
    </button>
    <span id="overlay-title"
          style="font-weight:900;color:rgba(255,255,255,.8);font-size:.875rem;
                 overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:50vw;">
    </span>
    <div style="width:6rem"></div>
  </div>

  <div id="iframe-spinner">
    <div class="spinner-ring"></div>
  </div>

  <iframe id="kiosk-iframe" src=""
          allow="accelerometer; autoplay; clipboard-write; encrypted-media;
                 gyroscope; picture-in-picture; fullscreen">
  </iframe>

  <div id="iframe-blocked">
    <span style="font-size:5rem">🚫</span>
    <h2 style="font-size:1.5rem;font-weight:900;text-align:center">
      Tahle stránka se nechce zobrazit uvnitř kiosku
    </h2>
    <p style="color:rgba(255,255,255,.5);text-align:center;max-width:400px">
      Stránka blokuje zobrazení v rámci jiné aplikace.<br>
      Požádej rodiče o pomoc, nebo zkus jinou dlaždici.
    </p>
    <button onclick="closeOverlay()"
            style="background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.25);
                   padding:.75rem 2rem;border-radius:1rem;font-weight:900;font-size:1rem;
                   color:white;cursor:pointer;font-family:inherit;transition:background .2s"
            onmouseover="this.style.background='rgba(255,255,255,.25)'"
            onmouseout="this.style.background='rgba(255,255,255,.15)'">
      🏠 Zpět domů
    </button>
  </div>
</div>

<script>
  const _overlay  = document.getElementById('kiosk-overlay');
  const _iframe   = document.getElementById('kiosk-iframe');
  const _spinner  = document.getElementById('iframe-spinner');
  const _blocked  = document.getElementById('iframe-blocked');
  const _titleEl  = document.getElementById('overlay-title');
  let   _blockTimer = null;

  function openTile(url, name) {
    if (url.startsWith('/')) { window.location.href = url; return; }
    _titleEl.textContent = name;
    _spinner.style.display = 'flex';
    _blocked.classList.remove('visible');
    _iframe.style.visibility = 'hidden';
    _overlay.classList.remove('hidden');
    document.body.style.overflow = 'hidden';
    _iframe.src = url;

    _iframe.onload = () => {
      clearTimeout(_blockTimer);
      _spinner.style.display = 'none';
      try {
        const body = _iframe.contentDocument && _iframe.contentDocument.body;
        if (body && body.innerHTML.trim() === '') { _showBlocked(); return; }
      } catch(e) { /* cross-origin = probably fine */ }
      _iframe.style.visibility = 'visible';
    };
    _blockTimer = setTimeout(() => { _spinner.style.display='none'; _showBlocked(); }, 15000);
  }

  function _showBlocked() {
    _iframe.style.visibility = 'hidden';
    _blocked.classList.add('visible');
  }

  function closeOverlay() {
    clearTimeout(_blockTimer);
    _overlay.classList.add('hidden');
    _iframe.src = '';
    _iframe.style.visibility = 'hidden';
    _blocked.classList.remove('visible');
    document.body.style.overflow = '';
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape' && !_overlay.classList.contains('hidden')) closeOverlay();
  });
</script>
