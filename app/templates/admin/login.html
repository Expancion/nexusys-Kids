<!doctype html>
<html lang="{{ get_locale() }}">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ _('Parent Panel') }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { font-family: system-ui, sans-serif; }
  </style>
</head>
<body class="min-h-screen bg-slate-950 flex items-center justify-center p-4">
  <div class="w-full max-w-sm">

    <div class="text-center mb-8">
      <div class="text-5xl mb-3">🔐</div>
      <h1 class="text-2xl font-black text-white">{{ _('Parent Panel') }}</h1>
      <p class="text-slate-400 text-sm mt-1">{{ _('Enter the parent password to continue') }}</p>
    </div>

    <form method="post" class="space-y-4">
      <div>
        <label class="block text-sm font-bold text-slate-300 mb-1.5">{{ _('Password') }}</label>
        <input
          type="password"
          name="password"
          autofocus
          required
          placeholder="••••••••"
          class="w-full rounded-xl bg-slate-800 border border-slate-700 px-4 py-3 text-white
                 placeholder:text-slate-500 focus:outline-none focus:border-indigo-500 focus:ring-1
                 focus:ring-indigo-500 transition"
        />
      </div>

      {% if error %}
      <p class="rounded-xl bg-red-500/10 border border-red-500/30 px-4 py-2.5 text-sm text-red-400">
        {{ error }}
      </p>
      {% endif %}

      <button
        type="submit"
        class="w-full rounded-xl bg-indigo-600 hover:bg-indigo-500 px-4 py-3 font-bold text-white
               transition active:scale-95"
      >
        {{ _('Sign in') }}
      </button>
    </form>

    <div class="mt-6 text-center">
      <a href="/" class="text-sm text-slate-500 hover:text-slate-300 transition">← {{ _('Back to kiosk') }}</a>
    </div>

  </div>
</body>
</html>
