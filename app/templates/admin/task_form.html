<!doctype html>
<html lang="{{ get_locale() }}">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{% if task %}{{ _('Edit task') }}{% else %}{{ _('New task') }}{% endif %} — {{ _('Parent Panel') }}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body { font-family: system-ui, sans-serif; }</style>
</head>
<body class="min-h-screen bg-[#0d0d18] text-slate-100">

  {% include 'admin/_admin_nav.html' %}

  <main class="max-w-lg mx-auto px-6 py-8">
    <div class="mb-6">
      <a href="/admin/tasks" class="text-slate-400 hover:text-white transition text-sm">← {{ _('Back') }}</a>
      <h1 class="text-xl font-black text-white mt-2">
        {% if task %}{{ _('Edit task') }}{% else %}{{ _('New task') }}{% endif %}
      </h1>
    </div>

    <!-- Preview -->
    <div class="rounded-2xl border border-slate-800 bg-slate-900 p-5 mb-6
                flex items-center gap-4">
      <span id="preview-icon" class="text-4xl select-none">{{ task.icon if task else '⭐' }}</span>
      <div>
        <p class="font-black text-white text-lg" id="preview-name">
          {{ task.name if task else _('Task name') }}
        </p>
        <p class="text-yellow-400 font-black text-sm" id="preview-points">
          +{{ task.points_value if task else 10 }} ⭐
        </p>
      </div>
    </div>

    <form method="post" class="space-y-5">

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-bold text-slate-300 mb-1.5">{{ _('Name') }}</label>
          <input type="text" name="name" required maxlength="120"
                 value="{{ task.name if task else '' }}"
                 placeholder="{{ _('Clean room') }}"
                 oninput="document.getElementById('preview-name').textContent=this.value||'{{ _('Task name') }}'"
                 class="w-full rounded-xl bg-slate-800 border border-slate-700 px-4 py-3 text-white
                        placeholder:text-slate-500 focus:outline-none focus:border-indigo-500
                        focus:ring-1 focus:ring-indigo-500 transition" />
        </div>
        <div>
          <label class="block text-sm font-bold text-slate-300 mb-1.5">{{ _('Icon') }}</label>
          <input type="text" name="icon" maxlength="4"
                 value="{{ task.icon if task else '⭐' }}"
                 oninput="document.getElementById('preview-icon').textContent=this.value||'⭐'"
                 class="w-full rounded-xl bg-slate-800 border border-slate-700 px-4 py-3 text-white
                        text-2xl focus:outline-none focus:border-indigo-500
                        focus:ring-1 focus:ring-indigo-500 transition" />
        </div>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="block text-sm font-bold text-slate-300 mb-1.5">{{ _('Points for completion') }}</label>
          <input type="number" name="points_value" min="1" max="9999" required
                 value="{{ task.points_value if task else 10 }}"
                 oninput="document.getElementById('preview-points').textContent='+' + (this.value||0) + ' ⭐'"
                 class="w-full rounded-xl bg-slate-800 border border-slate-700 px-4 py-3 text-white
                        focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition" />
        </div>
        <div>
          <label class="block text-sm font-bold text-slate-300 mb-1.5">{{ _('Order') }}</label>
          <input type="number" name="sort_order" min="0" max="999"
                 value="{{ task.sort_order if task else 0 }}"
                 class="w-full rounded-xl bg-slate-800 border border-slate-700 px-4 py-3 text-white
                        focus:outline-none focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 transition" />
        </div>
      </div>

      <div class="flex gap-3 pt-2">
        <button type="submit"
                class="rounded-xl bg-indigo-600 hover:bg-indigo-500 px-6 py-3 font-bold
                       text-white transition active:scale-95">
          {% if task %}{{ _('Save') }}{% else %}{{ _('Create task') }}{% endif %}
        </button>
        <a href="/admin/tasks"
           class="rounded-xl border border-slate-700 px-6 py-3 font-bold text-slate-300
                  hover:border-slate-500 hover:text-white transition">
          {{ _('Cancel') }}
        </a>
      </div>
    </form>
  </main>
</body>
</html>
