{# Shared admin navigation bar — included in all admin pages #}
{% set ep = request.endpoint %}
<nav class="sticky top-0 z-10 flex items-center justify-between border-b border-slate-800
            bg-slate-950/90 backdrop-blur px-6 py-3 gap-4 flex-wrap">
  <div class="flex items-center gap-2 flex-wrap">
    <span class="text-lg font-black text-white mr-2">⚙️ Rodičovský panel</span>

    <a href="/admin/tiles"
       class="rounded-xl px-4 py-1.5 text-sm font-bold transition
              {% if ep in ('admin.tiles', 'admin.tile_new', 'admin.tile_edit') %}
                bg-slate-700 text-white
              {% else %}
                border border-slate-700 text-slate-400 hover:text-white
              {% endif %}">
      🧩 Dlaždice
    </a>
    <a href="/admin/videos"
       class="rounded-xl px-4 py-1.5 text-sm font-bold transition
              {% if ep in ('admin.videos', 'admin.video_new', 'admin.video_edit', 'admin.video_cat_new', 'admin.video_cat_edit') %}
                bg-slate-700 text-white
              {% else %}
                border border-slate-700 text-slate-400 hover:text-white
              {% endif %}">
      📺 Videa
    </a>
    <a href="/admin/children"
       class="rounded-xl px-4 py-1.5 text-sm font-bold transition
              {% if ep in ('admin.children', 'admin.child_new', 'admin.child_edit', 'admin.child_detail', 'admin.device_new', 'admin.device_edit') %}
                bg-slate-700 text-white
              {% else %}
                border border-slate-700 text-slate-400 hover:text-white
              {% endif %}">
      👶 Děti
    </a>
    <a href="/admin/tasks"
       class="rounded-xl px-4 py-1.5 text-sm font-bold transition
              {% if ep in ('admin.tasks', 'admin.task_new', 'admin.task_edit') %}
                bg-slate-700 text-white
              {% else %}
                border border-slate-700 text-slate-400 hover:text-white
              {% endif %}">
      ⭐ Úkoly
    </a>
  </div>
  <div class="flex items-center gap-3 shrink-0">
    <a href="/" class="rounded-xl border border-slate-700 px-4 py-2 text-sm font-bold
                       text-slate-300 hover:border-slate-500 hover:text-white transition">
      🏠 Kiosek
    </a>
    <form method="post" action="/admin/logout" class="inline">
      <button class="rounded-xl bg-slate-800 hover:bg-slate-700 px-4 py-2 text-sm
                     font-bold text-slate-300 transition">
        Odhlásit
      </button>
    </form>
  </div>
</nav>
