{# Shared <head> + base styles for kiosk pages #}
<meta charset="utf-8" />
<meta name="google" content="notranslate">
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com"></script>
<style>
  * { font-family: 'Nunito', system-ui, sans-serif; }
  body {
    background: linear-gradient(125deg, #0d0221, #1a0533, #0a1628, #0d0221);
    background-size: 400% 400%;
    animation: bgShift 20s ease infinite;
  }
  @keyframes bgShift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
  .stars { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
  .star  {
    position: absolute; border-radius: 50%; background: white;
    animation: twinkle var(--d,3s) ease-in-out infinite var(--delay,0s);
  }
  @keyframes twinkle {
    0%,100% { opacity:.1; transform:scale(1); }
    50%     { opacity:.8; transform:scale(1.4); }
  }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,.15); border-radius: 3px; }

  /* Iframe overlay styles */
  #kiosk-overlay {
    position:fixed; inset:0; z-index:100;
    display:flex; flex-direction:column; background:#000;
  }
  #kiosk-overlay.hidden { display:none; }
  #overlay-bar {
    display:flex; align-items:center; justify-content:space-between;
    padding:0 1rem; height:52px; min-height:52px;
    background:rgba(15,10,30,.97);
    border-bottom:1px solid rgba(255,255,255,.08);
    flex-shrink:0;
  }
  #kiosk-iframe { flex:1; width:100%; border:none; }
  #iframe-blocked {
    position:absolute; inset:0; top:52px;
    display:none; flex-direction:column;
    align-items:center; justify-content:center;
    gap:1.5rem; background:#0a0a1a; color:white;
  }
  #iframe-blocked.visible { display:flex; }
  #iframe-spinner {
    position:absolute; inset:0; top:52px;
    display:flex; align-items:center; justify-content:center;
    background:#0a0a1a;
  }
  @keyframes spin { to { transform:rotate(360deg); } }
  .spinner-ring {
    width:48px; height:48px; border-radius:50%;
    border:4px solid rgba(255,255,255,.1);
    border-top-color:rgba(255,255,255,.7);
    animation:spin .8s linear infinite;
  }
</style>
