name: nexusys_home

services:
  web:
    platform: linux/amd64
    build:
      context: .
      dockerfile: dockerfile
    working_dir: /app
    volumes:
      - .:/app
      - ./instance:/app/instance
      - ./storage:/app/storage
    env_file:
      - .env
    ports:
      - "3030:8080"
    environment:
      FLASK_ENV: development
      FLASK_DEBUG: "1"
      FLASK_APP: run.py
      APP_PORT: "8080"
      DATABASE_URL: postgresql+psycopg://homeapp:homeapp_pass@db:5432/homeapp
      NEXUSYS_HOME_ROOT: /app/storage
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-homeapp}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-homeapp_pass}
      POSTGRES_DB: ${POSTGRES_DB:-homeapp}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-homeapp} -d ${POSTGRES_DB:-homeapp}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  caddy:
    build:
      context: ./caddy
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - ./certs:/certs
    depends_on:
      - web
    restart: unless-stopped

  adminer:
    image: adminer:5.4.1
    depends_on:
      db:
        condition: service_healthy
    environment:
      ADMINER_DEFAULT_SERVER: db
      ADMINER_DESIGN: pepa-linha-dark
    ports:
      - "8083:8080"
    restart: unless-stopped

volumes:
  pg_data:
  caddy_data:
  caddy_config:
